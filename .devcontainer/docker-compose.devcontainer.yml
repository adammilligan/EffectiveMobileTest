services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity
    environment:
      CONFIG_PATH: /workspace/configs/config.yaml
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: subscriptions
      DB_USER: subscriptions
      DB_PASSWORD: subscriptions
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8080
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "5173:5173"
